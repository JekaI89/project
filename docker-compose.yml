# Product web stack
# vendor/ and node_modules/ live in named volumes (Linux FS) to avoid
# Docker Desktop crash on Windows bind-mount I/O during composer/npm.

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: product_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
      # Optional: Delphi photos (files_product). Set PRODUCT_IMG_HOST and PRODUCT_IMG_PATH=/mnt/files_product
      # Example Windows: PRODUCT_IMG_HOST=E:/files_product
      - ${PRODUCT_IMG_HOST:-./storage/app/private}:/mnt/files_product:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: app
      PRODUCT_IMG_PATH: ${PRODUCT_IMG_PATH:-/mnt/files_product}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - product

  nginx:
    image: nginx:1.27-alpine
    container_name: product_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - product

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: product_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
    environment:
      CONTAINER_ROLE: queue
      SKIP_MIGRATE: "1"
    depends_on:
      - app
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - product

  node:
    image: node:22-alpine
    container_name: product_node
    working_dir: /var/www
    profiles: ["frontend"]
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
      - node_modules_data:/var/www/node_modules
    networks:
      - product

  mysql:
    image: mysql:8.0
    container_name: product_mysql
    restart: unless-stopped
    command: ["--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--sql-mode=NO_ENGINE_SUBSTITUTION"]
    environment:
      MYSQL_DATABASE: product_app
      MYSQL_USER: product
      MYSQL_PASSWORD: product
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_APP_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # runs only on empty data volume
      - ./docker/mysql/01-create-product.sql:/docker-entrypoint-initdb.d/01-create-product.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - product

  redis:
    image: redis:7-alpine
    container_name: product_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    networks:
      - product

networks:
  product:
    driver: bridge

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
